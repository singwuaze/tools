<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WUAZE - .swk Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #0071e3;
            --text: #ffffff;
            --bg-dark: #000205;
            --card-bg: rgba(10, 10, 10, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; user-select: none; }
        body { background: var(--bg-dark); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; color: var(--text); }

        .liquid-bg { position: absolute; inset: 0; z-index: -1; background: radial-gradient(circle at bottom left, #051937, #000); }
        .blob { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); filter: blur(90px); opacity: 0.25; border-radius: 50%; animation: float 12s infinite alternate ease-in-out; }
        @keyframes float { 0% { transform: translate(10%, 10%); } 100% { transform: translate(-10%, -20%); } }

        .gen-card {
            width: 100%; max-width: 500px; padding: 45px;
            background: var(--card-bg); backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border); border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        .step { display: none; animation: fadeIn 0.4s ease; }
        .active-step { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 700; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }
        input[type="text"] { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 16px; padding: 16px; color: #fff; font-size: 16px; outline: none; user-select: text; }
        .file-label { display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); border: 1px dashed var(--border); padding: 16px; border-radius: 16px; cursor: pointer; font-size: 14px; }

        .studio-box { background: rgba(0,0,0,0.4); padding: 25px; border-radius: 30px; border: 1px solid var(--border); margin-bottom: 25px; }
        
        /* Studio Player UI */
        .mode-selector { display: flex; gap: 8px; margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 14px; }
        .mode-btn { flex: 1; padding: 8px; border: none; border-radius: 10px; background: transparent; color: #666; font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .mode-btn.active { background: var(--accent); color: #fff; }

        .player-row { display: flex; align-items: center; gap: 15px; }
        .play-btn { background: #fff; color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        
        #music-slider { width: 100%; height: 6px; background: #222; border-radius: 10px; outline: none; -webkit-appearance: none; cursor: pointer; }
        #music-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; border: 2px solid var(--accent); }
        .time-info { display: flex; justify-content: space-between; font-size: 10px; font-family: monospace; opacity: 0.5; margin-top: 8px; }

        #lrcDisplay { height: 130px; overflow-y: hidden; text-align: center; margin-top: 15px; }
        .lrc-line { font-size: 18px; color: #333; margin: 12px 0; transition: 0.4s; font-weight: 700; text-transform: uppercase; }
        .lrc-line.active { color: #fff; transform: scale(1.1); text-shadow: 0 0 15px var(--accent); }

        .variant-box { margin-top: 15px; position: relative; }
        select { width: 100%; background: #111; color: #fff; border: 1px solid var(--accent); padding: 15px; border-radius: 16px; font-size: 14px; outline: none; cursor: pointer; appearance: none; -webkit-appearance: none; font-weight: 600; }
        .variant-box::after { content: '▼'; position: absolute; right: 20px; bottom: 18px; font-size: 10px; color: var(--accent); pointer-events: none; }

        .btn-primary { width: 100%; padding: 18px; border: none; border-radius: 20px; background: var(--accent); color: white; font-weight: 800; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .action-row { display: flex; gap: 10px; }
        #new-btn { display: none; background: rgba(255,255,255,0.1); border: 1px solid var(--border); }

        #build-progress-container { display: none; margin-top: 25px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; height: 14px; padding: 2px; overflow: hidden; }
        #build-progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), #00a2ff); border-radius: 20px; transition: width 0.2s ease-out; }
    </style>
</head>
<body>

    <div class="liquid-bg"><div class="blob"></div></div>

    <div class="gen-card">
        <div class="step active-step" id="step-1">
            <h2 style="margin-bottom: 25px;">Configuration</h2>
            <div class="input-group"><label>Song Title</label><input type="text" id="song" placeholder="Title"></div>
            <div class="input-group"><label>Artist Name</label><input type="text" id="artist" placeholder="Artist"></div>
            <button class="btn-primary" onclick="nextStep(2)">Next Step</button>
        </div>

        <div class="step" id="step-2">
            <h2 style="margin-bottom: 25px;">Audio Stems</h2>
            <div class="input-group">
                <label>Instrumental</label>
                <label class="file-label" for="inst-up"><span id="inst-txt">Select File</span> 📁</label>
                <input type="file" id="inst-up" accept="audio/*" hidden onchange="updName(this, 'inst-txt')">
            </div>
            <div class="input-group">
                <label>Vocals</label>
                <label class="file-label" for="voc-up"><span id="voc-txt">Select File</span> 📁</label>
                <input type="file" id="voc-up" accept="audio/*" hidden onchange="updName(this, 'voc-txt')">
            </div>
            <button class="btn-primary" onclick="launchStudio()">Enter Studio</button>
        </div>

        <div class="step" id="step-3">
            <div class="studio-box">
                <div class="mode-selector">
                    <button class="mode-btn active" id="mode-inst" onclick="setMode('inst')">Instrumental</button>
                    <button class="mode-btn" id="mode-voc" onclick="setMode('voc')">Vocals Only</button>
                </div>
                <div class="player-row">
                    <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
                    <div style="flex:1">
                        <input type="range" id="music-slider" value="0" step="0.01" oninput="seek(this.value)">
                        <div class="time-info"><span id="t-curr">0:00</span><span id="t-total">0:00</span></div>
                    </div>
                </div>
                <div id="lrcDisplay"><div id="lrcContent">Select Variant Below</div></div>
            </div>

            <div class="variant-box">
                <label>Lyrics Varieties</label>
                <select id="lyrics-select" onchange="loadLyrics(this.value)">
                    <option value="">Searching...</option>
                </select>
            </div>
            
            <div class="action-row">
                <button class="btn-primary" id="new-btn" onclick="resetAll()">New</button>
                <button class="btn-primary" id="buildBtn" onclick="buildSWK()">Build</button>
            </div>
            
            <div id="build-progress-container"><div id="build-progress-bar"></div></div>
        </div>
    </div>

    <script>
        let a1 = new Audio(), a2 = new Audio(), lData = [], isP = false, vars = [];
        let rawInst, rawVoc, activeLrcMeta = null;
        let lastBuiltBlob = null, lastFileName = "";
        let currentMode = 'inst'; // 'inst' or 'voc'

        function updName(i, id) { if(i.files[0]) document.getElementById(id).innerText = i.files[0].name; }
        function nextStep(n) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active-step')); document.getElementById('step-'+n).classList.add('active-step'); }

        async function launchStudio() {
            const t = document.getElementById('song').value, r = document.getElementById('artist').value;
            rawInst = document.getElementById('inst-up').files[0];
            rawVoc = document.getElementById('voc-up').files[0];
            if(!rawInst || !rawVoc) return alert("Files required!");

            a1.src = URL.createObjectURL(rawInst); 
            a2.src = URL.createObjectURL(rawVoc);
            a1.load(); a2.load();

            a1.onloadedmetadata = () => {
                document.getElementById('t-total').innerText = fmt(a1.duration);
                document.getElementById('music-slider').max = a1.duration;
            };
            nextStep(3); fetchV(t, r);
        }

        function setMode(mode) {
            const wasPlaying = isP;
            if (wasPlaying) pauseAll();
            
            currentMode = mode;
            document.getElementById('mode-inst').classList.toggle('active', mode === 'inst');
            document.getElementById('mode-voc').classList.toggle('active', mode === 'voc');
            
            // Sync current time to new track
            const time = a1.currentTime;
            a1.currentTime = time;
            a2.currentTime = time;

            if (wasPlaying) togglePlay();
        }

        async function fetchV(t, r) {
            const s = document.getElementById('lyrics-select');
            try {
                const res = await fetch(`https://lrclib.net/api/search?artist_name=${encodeURIComponent(r)}&track_name=${encodeURIComponent(t)}`);
                vars = await res.json();
                s.innerHTML = '<option value="">Choose Version</option>';
                vars.forEach((v, i) => { if(v.syncedLyrics) {
                    let o = document.createElement('option'); o.value = i;
                    o.innerText = `${i+1}. ${v.albumName || 'Single'} (${fmt(v.duration)})`;
                    s.appendChild(o);
                }});
            } catch(e) { s.innerHTML = '<option>Error</option>'; }
        }

        function loadLyrics(idx) {
            if(idx === "") return;
            const data = vars[idx];
            activeLrcMeta = { title: data.trackName, artist: data.artistName, url: `https://lrclib.net/api/get/${data.id}` };
            const c = document.getElementById('lrcContent'); c.innerHTML = ""; lData = [];
            data.syncedLyrics.split('\n').forEach(line => {
                const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                if(m) {
                    const time = parseInt(m[1]) * 60 + parseFloat(m[2]);
                    const d = document.createElement('div'); d.className = 'lrc-line'; d.innerText = m[3].trim();
                    c.appendChild(d); lData.push({ time, el: d });
                }
            });
            lastBuiltBlob = null;
            document.getElementById('buildBtn').innerText = "Build";
        }

        async function togglePlay() {
            const activeAudio = currentMode === 'inst' ? a1 : a2;
            const idleAudio = currentMode === 'inst' ? a2 : a1;

            if(!isP) {
                idleAudio.pause(); // Ensure the other is off
                activeAudio.currentTime = idleAudio.currentTime; // Sync
                await activeAudio.play();
                isP = true;
                document.getElementById('playBtn').innerText = "⏸";
                requestAnimationFrame(syncLoop);
            } else {
                pauseAll();
            }
        }

        function pauseAll() {
            a1.pause(); a2.pause();
            isP = false;
            document.getElementById('playBtn').innerText = "▶";
        }

        function seek(v) {
            const time = parseFloat(v);
            a1.currentTime = time;
            a2.currentTime = time;
            document.getElementById('t-curr').innerText = fmt(time);
        }

        function fmt(s) { const m = Math.floor(s/60), sc = Math.floor(s%60); return `${m}:${sc<10?'0':''}${sc}`; }

        function syncLoop() {
            if (!isP) return;
            const activeAudio = currentMode === 'inst' ? a1 : a2;
            const t = activeAudio.currentTime;
            
            document.getElementById('music-slider').value = t;
            document.getElementById('t-curr').innerText = fmt(t);
            
            lData.forEach((item, i) => {
                const nxt = lData[i+1];
                if(t >= item.time && (!nxt || t < nxt.time)) {
                    item.el.classList.add('active'); item.el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else { item.el.classList.remove('active'); }
            });
            requestAnimationFrame(syncLoop);
        }

        async function buildSWK() {
            const buildBtn = document.getElementById('buildBtn');
            const newBtn = document.getElementById('new-btn');
            if (lastBuiltBlob) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(lastBuiltBlob);
                link.download = lastFileName; link.click(); return;
            }
            if(!activeLrcMeta) return alert("Pick lyrics first!");
            buildBtn.disabled = true; buildBtn.innerText = "Processing...";
            const progressCont = document.getElementById('build-progress-container');
            const progressBar = document.getElementById('build-progress-bar');
            progressCont.style.display = "block";
            
            const zip = new JSZip();
            const art = document.getElementById('artist').value.toUpperCase();
            const tit = document.getElementById('song').value.toUpperCase();
            lastFileName = `${art} - ${tit}.swk`;
            
            zip.file("instruments.mp3", rawInst);
            zip.file("vocals.mp3", rawVoc);
            zip.file("lrc.json", JSON.stringify(activeLrcMeta, null, 2));

            lastBuiltBlob = await zip.generateAsync({type:"blob"}, (m) => { progressBar.style.width = m.percent + "%"; });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(lastBuiltBlob);
            link.download = lastFileName; link.click();
            
            setTimeout(() => {
                buildBtn.disabled = false; buildBtn.innerText = "Redownload";
                progressCont.style.display = "none"; newBtn.style.display = "block";
            }, 1000);
        }

        function resetAll() {
            pauseAll(); a1 = new Audio(); a2 = new Audio();
            lastBuiltBlob = null;
            document.getElementById('song').value = ""; document.getElementById('artist').value = "";
            document.getElementById('inst-up').value = ""; document.getElementById('voc-up').value = "";
            document.getElementById('inst-txt').innerText = "Select File"; document.getElementById('voc-txt').innerText = "Select File";
            document.getElementById('lrcContent').innerHTML = "Select Variant Below";
            document.getElementById('lyrics-select').innerHTML = '<option value="">Searching...</option>';
            document.getElementById('new-btn').style.display = "none";
            document.getElementById('buildBtn').innerText = "Build";
            nextStep(1);
        }
    </script>
</body>
</html>
