<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WUAZE TOOLS</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #0071e3;
            --text: #ffffff;
            --bg-dark: #000205;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text);
        }

        .brand {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.9);
            z-index: 5;
        }

        /* --- BACKGROUND --- */
        .liquid-bg {
            position: absolute;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at top right, #001529, #000);
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 65%);
            filter: blur(80px);
            opacity: 0.35;
            border-radius: 50%;
            animation: float 15s infinite alternate ease-in-out;
            will-change: transform;
        }

        @keyframes float {
            0% { transform: translate3d(-15%, -15%, 0) scale(1); }
            100% { transform: translate3d(25%, 20%, 0) scale(1.3); }
        }

        .container {
            display: flex;
            flex-wrap: wrap; /* Allows wrapping on smaller screens */
            justify-content: center;
            gap: 25px;
            padding: 20px;
            z-index: 2;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .card {
            width: 300px; /* Slightly slimmer to fit 3 in a row better */
            padding: 40px 30px;
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 35px;
            text-align: center;
            transition: transform 0.4s ease, border-color 0.4s;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Ensures buttons align at bottom */
        }

        .card:hover { 
            transform: translateY(-10px); 
            border-color: rgba(255,255,255,0.3);
        }

        .icon-wrapper {
            width: 70px;
            height: 70px;
            margin: 0 auto 25px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: var(--accent);
        }

        h2 { font-size: 22px; margin-bottom: 12px; font-weight: 700; }
        p { font-size: 13px; color: rgba(255, 255, 255, 0.5); margin-bottom: 30px; line-height: 1.5; min-height: 40px; }

        .apple-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.3);
        }

        .apple-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 6px 20px rgba(0, 113, 227, 0.4);
        }

        .apple-btn:active { transform: scale(0.98); }

        /* --- OVERLAY PANEL --- */
        #gen-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            display: none;
            flex-direction: column;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translate3d(0, 100%, 0); }
            to { transform: translate3d(0, 0, 0); }
        }

        .overlay-header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .close-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .close-btn:hover { background: rgba(255,69,58,0.8); }

        iframe {
            flex-grow: 1;
            border: none;
            width: 100%;
            background: transparent;
        }

        /* Loading Spinner */
        #loader {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 150;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="brand">WUAZE TOOLS</div>

    <div class="liquid-bg">
        <div class="blob"></div>
    </div>

    <div class="container" id="main-dashboard">
        <div class="card">
            <div>
                <div class="icon-wrapper">⏦</div>
                <h2>Isolate Music</h2>
                <p>Neural engine for professional vocal and instrumental separation.</p>
            </div>
            <button class="apple-btn" onclick="runIsolate()">Isolate</button>
        </div>

        <div class="card">
            <div>
                <div class="icon-wrapper">✦</div>
                <h2>Generate .swk</h2>
                <p>Create a fresh .swk project from your audio stems and lyrics.</p>
            </div>
            <button class="apple-btn" onclick="openGenerate()">Generate</button>
        </div>

        <div class="card">
            <div>
                <div class="icon-wrapper">⚙</div>
                <h2>Edit .swk</h2>
                <p>Modify existing packages, update metadata, or swap audio files.</p>
            </div>
            <button class="apple-btn" onclick="openEdit()">Edit Project</button>
        </div>
    </div>

    <div id="gen-overlay">
        <div class="overlay-header">
            <span id="overlay-title" style="font-weight: 700; letter-spacing: 1px; text-transform: uppercase;">.SWK GENERATOR</span>
            <button class="close-btn" onclick="closeOverlay()">Close</button>
        </div>
        <iframe id="tool-frame" src=""></iframe>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p style="font-size: 10px; letter-spacing: 2px;">LAUNCHING EXTERNAL STUDIO</p>
    </div>

    <script>
        const overlay = document.getElementById('gen-overlay');
        const frame = document.getElementById('tool-frame');
        const dashboard = document.getElementById('main-dashboard');
        const title = document.getElementById('overlay-title');

        function haptic() { if (navigator.vibrate) navigator.vibrate(12); }

        function runIsolate() {
            haptic();
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            setTimeout(() => {
                window.open('https://vocalremover.org/', '_blank');
                setTimeout(() => { loader.style.display = 'none'; }, 1000);
            }, 600);
        }

        function openGenerate() {
            haptic();
            title.innerText = ".SWK GENERATOR";
            frame.src = "generate/index.html";
            showOverlay();
        }

        function openEdit() {
            haptic();
            title.innerText = ".SWK EDITOR";
            // Set this to your editor path when ready
            frame.src = "edit/index.html"; 
            showOverlay();
        }

        function showOverlay() {
            overlay.style.display = 'flex';
            dashboard.style.opacity = '0.3';
            dashboard.style.transform = 'scale(0.95)';
        }

        function closeOverlay() {
            overlay.style.display = 'none';
            frame.src = ""; // Clear frame to save memory
            dashboard.style.opacity = '1';
            dashboard.style.transform = 'scale(1)';
        }
    </script>
</body>
</html>
